# MatchLayer — local development stack
#
# Three services on Docker's default bridge network:
#   - postgres : Phase 1 primary datastore
#   - redis    : Phase 4+ cache / rate-limit / agent state (kept here so
#                local parity with prod is in place from day one)
#   - minio    : S3-compatible object storage for resume uploads (Phase 1+)
#
# All images pinned by SHA256 digest so the stack is reproducible across
# machines and protected against supply-chain mutation of mutable tags.
# The human-readable tag is left in place as documentation; Docker
# resolves the @sha256 digest, not the tag.
#
# Bring the stack up with:
#   docker compose up -d --wait
#
# The named volumes below are NOT removed by `docker compose down`. To
# wipe local data explicitly, run `docker compose down -v`.

services:
  postgres:
    image: postgres:16-alpine@sha256:16bc17c64a573ef34162af9298258d1aec548232985b33ed7b1eac33ba35c229
    environment:
      POSTGRES_USER: matchlayer
      POSTGRES_PASSWORD: dev_only_password
      POSTGRES_DB: matchlayer
    ports:
      - "5432:5432"
    volumes:
      - matchlayer-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U matchlayer -d matchlayer"]
      interval: 2s
      timeout: 3s
      retries: 30

  redis:
    image: redis:7-alpine@sha256:6ab0b6e7381779332f97b8ca76193e45b0756f38d4c0dcda72dbb3c32061ab99
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 30

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z@sha256:14cea493d9a34af32f524e538b8346cf79f3321eff8e708c1e2960462bd8936e
    command: server /data --console-address :9001
    environment:
      MINIO_ROOT_USER: matchlayer
      MINIO_ROOT_PASSWORD: dev_only_password
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - matchlayer-minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 2s
      timeout: 3s
      retries: 30

volumes:
  matchlayer-postgres-data:
  matchlayer-minio-data:
