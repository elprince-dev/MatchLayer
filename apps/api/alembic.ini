# Alembic configuration for the MatchLayer API.
#
# Phase 1 foundation only ŌĆö no domain migrations yet (Design ┬¦6.7).
# The single committed revision is ``alembic/versions/0000_baseline.py``,
# an empty no-op that exists so future revisions have a parent. The
# first real migration lands in ``phase-1-auth``.
#
# ``env.py`` reads the database URL from ``Settings`` (via
# ``MATCHLAYER_DATABASE_URL`` and the local ``.env`` file). It swaps the
# ``+asyncpg`` driver for the sync ``+psycopg`` driver since Alembic
# itself stays sync, while application traffic uses asyncpg through
# SQLAlchemy 2.x's async API. There is intentionally no
# ``sqlalchemy.url`` key below ŌĆö defining one would shadow the value
# Settings supplies and re-introduce the divergence Requirement 4.2 is
# meant to prevent ("all configuration through a single
# ``pydantic-settings`` ``BaseSettings`` subclass").

[alembic]
# Anchor every Alembic-managed path on ``%(here)s`` (the directory
# containing this ``alembic.ini`` ŌĆö ``apps/api/``) so the CLI works
# whether invoked as ``cd apps/api && uv run alembic ...`` (the dev
# loop) or as ``uv run --project apps/api alembic -c apps/api/alembic.ini
# ...`` (the README onboarding flow run from the repo root).
script_location = %(here)s/alembic

# ``prepend_sys_path = %(here)s`` so ``env.py`` can ``import
# matchlayer_api.config``. Combined with the ``src`` package layout
# declared in ``pyproject.toml`` (``[tool.hatch.build.targets.wheel].packages
# = ["src/matchlayer_api"]``), Alembic resolves the import the same way
# the runtime app does ŌĆö via ``apps/api/`` on ``sys.path`` plus the
# ``matchlayer-api`` editable install ``uv sync`` creates.
prepend_sys_path = %(here)s

# Pin the on-disk filename layout for new revisions to match the committed
# baseline (``0000_baseline.py``). ``%(rev)s_%(slug)s`` keeps revision IDs
# numeric/short and slugs derived from the ``-m`` message.
file_template = %%(rev)s_%%(slug)s

# ``%(here)s`` resolves to the directory containing this file (``apps/api/``)
# regardless of where ``alembic`` is invoked from. Pinning the absolute path
# prevents Alembic from accidentally generating revisions into a parent
# directory when developers run it from a sibling shell.
version_locations = %(here)s/alembic/versions

# Use UTC for timestamps Alembic embeds in revision file headers; matches
# the ISO/UTC ``TimeStamper`` configured for structlog (Design ┬¦6.3).
timezone = UTC

# Truncate generated slugs at 40 characters so filenames stay readable in
# git logs and IDE file trees.
truncate_slug_length = 40

# ``output_encoding = utf-8`` makes Alembic's stdout deterministic across
# platforms; CI runs on Linux but local dev sometimes runs on macOS.
output_encoding = utf-8


# ---------------------------------------------------------------------------
# Logging ŌĆö Alembic uses the standard ``logging`` module. We deliberately
# avoid wiring it into structlog here: Alembic runs as a CLI, not inside the
# request lifecycle, so the structured access-log envelope from
# ``core/middleware.py`` does not apply. A plain console formatter is enough
# for ``alembic upgrade head`` / ``alembic history`` output to be readable.
# ---------------------------------------------------------------------------

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
